name: Play Reviews Digest

# Weekly digest of recent Play reviews (flagging unanswered ones) and
# crash/ANR vitals, written to the job summary. Read-only against the
# Play APIs; needs PLAY_SERVICE_ACCOUNT_JSON. Before the app is
# published the APIs have nothing to report and the digest says so
# instead of failing.
#
# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout                @ v7.0.0  → 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/setup-python            @ v6.3.0  → ece7cb06caefa5fff74198d8649806c4678c61a1

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    name: Reviews + vitals digest
    runs-on: ubuntu-24.04
    steps:
      - name: Gate on Play credentials
        id: gate
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set. Skipping the digest."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s' "${PLAY_SERVICE_ACCOUNT_JSON}" > "${RUNNER_TEMP}/play-key.json"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install API clients
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        run: python -m pip install 'google-auth==2.37.0' 'requests==2.32.3'

      - name: Build digest
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          PLAY_KEY_FILE: ${{ runner.temp }}/play-key.json
        run: python scripts/play_reviews_digest.py
