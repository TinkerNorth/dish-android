name: Android CI

# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout              @ v6.0.3 → df4cb1c069e1874edd31b4311f1884172cec0e10
#   actions/setup-java            @ v5.3.0 → ad2b38190b15e4d6bdf0c97fb4fca8412226d287
#   actions/setup-python          @ v6.2.0 → a309ff8b426b58ec0e2a45f0f869d46889d02405
#   actions/upload-artifact       @ v7.0.1 → 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   gradle/actions/setup-gradle   @ v6.2.0 → 3f131e8634966bd73d06cc69884922b02e6faf92
#   reactivecircus/android-emulator-runner @ v2.38.0 → a421e43855164a8197daf9d8d40fe71c6996bb0d

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Pre-install CMake 3.22.1
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Pinned to match satellite + dish-linux + dish-mac so all four repos
      # share one canonical clang-format ruleset and tool version.
      - name: Install clang-format (pinned 22.1.4)
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'clang-format==22.1.4'

      - name: clang-format (JNI, check only)
        run: |
          FILES=$(find app/src/main/cpp -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.c' \))
          [ -z "$FILES" ] || echo "$FILES" | xargs clang-format --dry-run --Werror

      - name: Play metadata lint (lengths, counts, dimensions)
        run: python scripts/check_play_metadata.py

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ktlint check
        run: ./gradlew ktlintCheck

      - name: detekt
        run: ./gradlew detekt

      - name: Lint check
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run native unit tests
        run: ./gradlew :app:nativeTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  instrumented:
    name: Integration tests (managed device)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Pre-install CMake 3.22.1
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build app + test APKs
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Run integration tests
        # Same emulator path the screenshots workflow uses (google_apis, KVM):
        # a known-good CI image for this app's GameActivity. Scoped to the
        # integration package. The pixel6Api34 managed device stays for local
        # runs (scripts/ci_local.sh --gmd).
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: >-
            ./gradlew :app:connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.package=com.tinkernorth.dish.integration

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/
          retention-days: 7
