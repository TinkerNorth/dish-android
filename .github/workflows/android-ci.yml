name: Android CI

# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout              @ v4.2.2 → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/setup-java            @ v5.2.0 → be666c2fcd27ec809703dec50e508c2fdc7f6654
#   actions/setup-python          @ v5.3.0 → 0b93645e9fea7318ecaed2b359559ac225c90a2b
#   actions/upload-artifact       @ v7.0.1 → 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   gradle/actions/setup-gradle   @ v4.1.0 → d156388eb19639ec20ade50009f3d199ce1e2808

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Pre-install CMake 3.22.1
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Pinned to match satellite + dish-linux + dish-mac so all four repos
      # share one canonical clang-format ruleset and tool version.
      - name: Install clang-format (pinned 22.1.4)
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'clang-format==22.1.4'

      - name: clang-format (JNI, check only)
        run: |
          FILES=$(find app/src/main/cpp -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.c' \))
          [ -z "$FILES" ] || echo "$FILES" | xargs clang-format --dry-run --Werror

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ktlint check
        run: ./gradlew ktlintCheck

      - name: detekt
        run: ./gradlew detekt

      - name: Lint check
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7
