name: Security

# PR-time security gates for dish-android. Pulls the shared jobs from
# this repo's local copy of `_security.yml` (action-pin lint, allowlist-
# expiry, OSV-Scanner, dependency-review, gitleaks). CodeQL lives in
# codeql.yml because it has its own matrix.
#
# In addition to the shared jobs, the `dependency-check` job runs the
# OWASP Dependency-Check Gradle plugin against the resolved Gradle
# classpath (CVSS >= 7.0 fails the build).
#
# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout              @ v6.0.3 → df4cb1c069e1874edd31b4311f1884172cec0e10
#   actions/cache                 @ v5.0.5 → 27d5ce7f107fe9357f9df03efb73ab90386fccae
#   actions/setup-java            @ v5.3.0 → ad2b38190b15e4d6bdf0c97fb4fca8412226d287
#   actions/upload-artifact       @ v7.0.1 → 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   gradle/actions/setup-gradle   @ v6.2.0 → 3f131e8634966bd73d06cc69884922b02e6faf92
#   github/codeql-action/upload-sarif @ v4.36.2 → 8aad20d150bbac5944a9f9d289da16a4b0d87c1e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  shared:
    uses: ./.github/workflows/_security.yml
    with:
      # OSV recognises Gradle build files; let it scan the worktree.
      osv_scan_paths: |
        .
      gitleaks_enabled: true
      dependency_review_enabled: true
      action_pin_lint_enabled: true
      allowlist_expiry_enabled: true

  dependency-check:
    name: OWASP Dependency-Check (CVSS >= 7.0 fails)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Compute NVD cache week
        id: nvdweek
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Cache OWASP Dependency-Check NVD database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Reuses the local NVD mirror across builds. The key rotates weekly
          # because an exact-key hit never re-saves: a permanent key pins the
          # first save forever, so runs restore an ever-staler database and
          # rebuilt ones are thrown away (this bit us with a June dud that
          # forced a full 346k-record sync on every run).
          path: ~/.gradle/dependency-check-data
          key: depcheck-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}-${{ steps.nvdweek.outputs.week }}
          restore-keys: |
            depcheck-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}-
            depcheck-${{ runner.os }}-

      - name: Run dependencyCheckAnalyze
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        # The OWASP plugin reads Task.project at execution time, which the configuration cache
        # (enabled in gradle.properties) rejects; disable it for this task only.
        run: ./gradlew dependencyCheckAnalyze --info --no-configuration-cache

      - name: Upload Dependency-Check report (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-report
          path: |
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.json
            build/reports/dependency-check-report.sarif
          retention-days: 14

      - name: Upload Dependency-Check SARIF to code scanning
        # Code scanning ingest requires GitHub Advanced Security on private
        # repos; tolerated as a soft failure until GHAS is enabled.
        if: ${{ always() && hashFiles('build/reports/dependency-check-report.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: build/reports/dependency-check-report.sarif
          category: dependency-check
