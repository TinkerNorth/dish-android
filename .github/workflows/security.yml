name: Security

# PR-time security gates for dish-android. Pulls the shared jobs from
# this repo's local copy of `_security.yml` (action-pin lint, allowlist-
# expiry, OSV-Scanner, dependency-review, gitleaks). CodeQL lives in
# codeql.yml because it has its own matrix.
#
# In addition to the shared jobs, the `dependency-check` job runs the
# OWASP Dependency-Check Gradle plugin against the resolved Gradle
# classpath (CVSS >= 7.0 fails the build).
#
# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout              @ v4.2.2 → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/setup-java            @ v4.5.0 → 8df1039502a15bceb9433410b1a100fbe190c53b
#   actions/upload-artifact       @ v4.4.3 → b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
#   gradle/actions/setup-gradle   @ v4.1.0 → cd5fcae1b41d7d6da8f0ea59fc8c1adc0ac75df3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  shared:
    uses: ./.github/workflows/_security.yml
    with:
      # OSV recognises Gradle build files; let it scan the worktree.
      osv_scan_paths: |
        .
      gitleaks_enabled: true
      dependency_review_enabled: true
      action_pin_lint_enabled: true
      allowlist_expiry_enabled: true

  dependency-check:
    name: OWASP Dependency-Check (CVSS >= 7.0 fails)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@cd5fcae1b41d7d6da8f0ea59fc8c1adc0ac75df3 # v4.1.0

      - name: Cache OWASP Dependency-Check NVD database
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          # Speeds up re-runs by reusing the local NVD mirror across builds.
          path: ~/.gradle/dependency-check-data
          key: depcheck-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: depcheck-${{ runner.os }}-

      - name: Run dependencyCheckAnalyze
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze --info

      - name: Upload Dependency-Check report (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dependency-check-report
          path: |
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.json
            build/reports/dependency-check-report.sarif
          retention-days: 14

      - name: Upload Dependency-Check SARIF to code scanning
        if: ${{ always() && hashFiles('build/reports/dependency-check-report.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
        with:
          sarif_file: build/reports/dependency-check-report.sarif
          category: dependency-check
